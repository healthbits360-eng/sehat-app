kind = "web"
previewPath = "/"
title = "RecoveryOS"
version = "1.0.0"
id = "artifacts/recovery-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22241

[services.development]
run = "pnpm --filter @workspace/recovery-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/recovery-os", "run", "build" ]
publicDir = "artifacts/recovery-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22241"
BASE_PATH = "/"
